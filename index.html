<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>똥을 피해라!</title>
<link rel="stylesheet" href="design.css">
</head>
<body>

<main class="game-shell">
<h1>💩 똥을 피해라!</h1>
<div class="game-stage">
  <canvas id="game" width="720" height="900"></canvas>
</div>

<section id="game-over-panel" class="game-over-panel hidden">
  <p id="final-score" class="final-score">이번 점수: 0점</p>

  <div class="controls">
    <input id="name" placeholder="계정명 입력">
    <button id="save-score" type="button">랭킹 저장</button>
  </div>

  <p id="save-feedback" class="save-feedback"></p>

  <section class="ranking-panel">
    <h2>🏆 랭킹</h2>
    <ol id="ranking"></ol>
  </section>

  <button id="restart-game" class="restart-button" type="button">다시 시작</button>
</section>
</main>

<script src="game.js" defer></script>

</body>
</html>
