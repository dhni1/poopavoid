<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>똥을 피해라!</title>
<link rel="stylesheet" href="design.css">
</head>
<body>

<main class="game-shell">
<h1>💩 똥을 피해라!</h1>
<canvas id="game" width="480" height="600"></canvas>

<div class="game-actions">
  <button id="restart-game" class="restart-button hidden" type="button">다시 시작</button>
</div>

<div class="controls">
  <input id="name" placeholder="계정명 입력">
  <button id="save-score" type="button">랭킹 저장</button>
</div>

<section class="ranking-panel">
  <h2>🏆 랭킹</h2>
  <ol id="ranking"></ol>
</section>
</main>

<script src="game.js" defer></script>

</body>
</html>
