<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>똥 피하기 게임</title>
<link rel="stylesheet" href="design.css">
</head>
<body>

<aside id="auth-dock" class="auth-dock is-collapsed" aria-label="계정">
  <button id="auth-toggle" class="auth-toggle" type="button">로그인</button>
  <section id="auth-panel" class="auth-panel hidden">
    <p id="auth-status" class="overlay-help">아이디와 비밀번호로 로그인해주세요.</p>
    <input id="display-name-input" class="hidden" type="text" maxlength="20" autocomplete="nickname" placeholder="이름 입력">
    <input id="login-id-input" type="text" maxlength="20" autocomplete="username" placeholder="아이디 입력 (한글 가능)">
    <input id="password-input" type="password" autocomplete="current-password" minlength="6" placeholder="비밀번호 입력 (6자 이상)">
    <button id="auth-submit" class="primary-button auth-submit" type="button">로그인</button>
    <button id="auth-switch" class="auth-link-button" type="button">회원가입</button>
    <button id="auth-close" class="auth-link-button" type="button">닫기</button>
    <button id="sign-out" class="secondary-button hidden auth-logout" type="button">로그아웃</button>
    <p id="auth-feedback" class="overlay-help"></p>
  </section>
</aside>

<main class="game-shell">
<h1>💩 똥을 피해라 💩</h1>

<div class="game-stage">
  <canvas id="game" width="720" height="900"></canvas>
  <div id="game-notification" class="game-notification hidden" aria-live="polite"></div>

  <section id="start-panel" class="overlay-panel">
    <p class="overlay-title">게임 시작</p>
    <p class="overlay-copy">오른쪽 위 로그인 버튼에서 접속한 뒤 게임을 시작하세요.</p>
    <p class="overlay-help">랭킹은 로그인한 아이디로 자동 저장됩니다.</p>
    <button id="start-game" class="primary-button" type="button">게임 시작</button>
  </section>

  <section id="game-over-overlay" class="overlay-panel hidden">
    <p class="overlay-title">게임 오버</p>
    <p id="final-score" class="overlay-score">점수: 0점</p>
    <p id="save-feedback" class="overlay-help"></p>
    <div class="overlay-actions">
      <button id="restart-game" class="primary-button" type="button">다시시작</button>
      <button id="toggle-ranking" class="secondary-button" type="button">랭킹</button>
    </div>
  </section>

  <section id="ranking-panel" class="overlay-panel ranking-panel hidden">
    <div class="ranking-header">
      <h2>🏆 랭킹</h2>
      <button id="close-ranking" class="secondary-button" type="button">닫기</button>
    </div>
    <ol id="ranking"></ol>
  </section>
</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="game.js" defer></script>

</body>
</html>
